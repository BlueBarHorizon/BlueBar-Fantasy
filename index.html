<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BlueBar UFC Fantasy</title>
<style>
  :root {
    --navy: #0a1628;
    --navy2: #0f1f3d;
    --navy3: #162447;
    --blue: #2e86ff;
    --blue-dim: #1a4fa0;
    --blue-glow: rgba(46,134,255,0.15);
    --text: #f0f4ff;
    --text-dim: #8a9ab8;
    --text-muted: #4a5a7a;
    --border: rgba(46,134,255,0.12);
    --gold: #f5b731;
    --silver: #b0bec5;
    --bronze: #cd7f32;
    --green: #00e676;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--navy); color: var(--text); font-family: var(--font); overflow-x: hidden; }

  /* HEADER */
  .header {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .header-sub {
    font-size: 11px;
    color: var(--blue);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .live-dot {
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* TABS */
  .tabs-wrapper {
    background: var(--navy2);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    padding: 0 8px;
    min-width: max-content;
  }
  .tab {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.02em;
  }
  .tab.active {
    color: var(--blue);
    border-bottom-color: var(--blue);
  }
  .tab:active { opacity: 0.7; }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* SECTION LABEL */
  .section-label {
    padding: 12px 16px 6px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* LEADERBOARD TABLE */
  .lb-table {
    width: 100%;
    border-collapse: collapse;
  }
  .lb-table thead tr {
    border-bottom: 1px solid var(--border);
  }
  .lb-table th {
    padding: 6px 16px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-align: left;
  }
  .lb-table th.r { text-align: right; }
  .lb-table td {
    padding: 11px 16px;
    font-size: 14px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .lb-table td.r { text-align: right; }
  .lb-table tr:last-child td { border-bottom: none; }
  .lb-table tr:active td { background: var(--blue-glow); }

  .rank-cell {
    width: 32px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .rank-1 { color: var(--gold) !important; font-weight: 700 !important; }
  .rank-2 { color: var(--silver) !important; font-weight: 600 !important; }
  .rank-3 { color: var(--bronze) !important; font-weight: 600 !important; }

  .player-name {
    font-weight: 500;
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 160px;
  }
  .player-belt {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .pts-cell {
    font-weight: 700;
    font-size: 15px;
    color: var(--blue);
    font-variant-numeric: tabular-nums;
  }
  .pts-zero {
    color: var(--text-muted) !important;
    font-weight: 400 !important;
  }

  /* TOP 3 ROW HIGHLIGHT */
  .row-1 td { background: rgba(245,183,49,0.05); }
  .row-2 td { background: rgba(176,190,197,0.04); }
  .row-3 td { background: rgba(205,127,50,0.04); }

  /* PICK CARDS */
  .picks-list {
    padding: 8px 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .pick-card {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    position: relative;
  }
  .pick-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .pick-player {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .pick-total {
    font-size: 14px;
    font-weight: 700;
    color: var(--blue);
  }
  .pick-fighters {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .fighter-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    background: var(--blue-glow);
    border: 1px solid rgba(46,134,255,0.2);
    color: var(--text-dim);
  }
  .fighter-chip .chip-pts {
    color: var(--blue);
    font-weight: 700;
    font-size: 10px;
  }
  .fighter-chip.scored {
    background: rgba(0,230,118,0.08);
    border-color: rgba(0,230,118,0.2);
    color: var(--text);
  }
  .fighter-chip.scored .chip-pts {
    color: var(--green);
  }
  .fighter-chip.zero {
    background: rgba(255,255,255,0.03);
    border-color: rgba(255,255,255,0.06);
    color: var(--text-muted);
  }

  /* LOADING / ERROR */
  .status-box {
    padding: 48px 24px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.6;
  }
  .status-box .icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* FOOTER */
  .footer {
    padding: 16px;
    text-align: center;
    font-size: 11px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }
  .footer a { color: var(--blue); text-decoration: none; }

  /* BELT BADGE */
  .belt-badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* SUBMIT PICKS FORM */
  .submit-wrap { padding: 12px 16px 24px; }
  .rules-box {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 14px;
  }
  .rules-box b { color: var(--text); }
  .free-access-banner {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    margin-bottom: 10px;
  }
  .field-group { margin-bottom: 14px; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    display: block;
  }
  .field-input {
    width: 100%;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--font);
  }
  .field-input:focus { outline: none; border-color: var(--blue-dim); }
  .budget-line {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
  }
  .budget-line b { color: var(--blue); }
  .budget-line.warn b { color: var(--gold); }

  .matchup-block {
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
  }
  .fighter-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 8px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .fighter-option:active { background: var(--blue-glow); }
  .fighter-option.selected { background: var(--blue-glow); border: 1px solid rgba(46,134,255,0.3); }
  .fighter-option input { width: 18px; height: 18px; accent-color: var(--blue); flex-shrink: 0; }
  .fighter-option-text { flex: 1; min-width: 0; }
  .fighter-option-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .fighter-option-meta { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .vs-divider {
    text-align: center;
    font-size: 10px;
    color: var(--text-muted);
    padding: 2px 0;
    letter-spacing: 0.1em;
  }

  .backup-select {
    width: 100%;
    background: var(--navy2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--font);
  }

  .submit-btn {
    width: 100%;
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 16px;
    cursor: pointer;
  }
  .submit-btn:disabled { background: var(--blue-dim); opacity: 0.5; cursor: not-allowed; }
  .submit-btn:active:not(:disabled) { opacity: 0.85; }

  .form-msg {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
  }
  .form-msg.error { background: rgba(255,82,82,0.1); color: #ff8a80; border: 1px solid rgba(255,82,82,0.25); }
  .form-msg.success { background: rgba(0,230,118,0.1); color: var(--green); border: 1px solid rgba(0,230,118,0.25); }
</style>

<div class="header">
  <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="48" fill="#0a1628"/>
    <polygon points="50,8 88,30 88,70 50,92 12,70 12,30" fill="none" stroke="#2e86ff" stroke-width="5"/>
    <text x="50" y="64" text-anchor="middle" font-size="42" font-weight="800" fill="#2e86ff" font-family="-apple-system,sans-serif">B</text>
    <line x1="14" y1="50" x2="86" y2="50" stroke="#2e86ff" stroke-width="5"/>
  </svg>
  <div class="header-text">
    <div class="header-title">BlueBar UFC Fantasy</div>

<div class="tabs-wrapper">

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const SHEET_ID = '11Xl5syIonKARDupGor2pXt3k1JJ7InaSqCL2oMb4aeY';
const API_KEY  = 'AIzaSyC09nEWKT530JIKF8uK9BHXjzk4ohPYXZQ';
const BASE     = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

// PASTE your deployed Apps Script Web App URL here after deployment (see APPS_SCRIPT.gs)
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsP7PEZNodohFNOCUn1NYTbrdR43wX-SumodalFpEzVwJHdV3N5MCXVbnwo6I4237uRQ/exec';

// ─── STATE ─────────────────────────────────────────────────────────────────
let tabs    = [];
let views   = {};
let activeTab = null;

// ─── FETCH HELPERS ─────────────────────────────────────────────────────────
async function fetchSheetNames() {
  const r = await fetch(`${BASE}?key=${API_KEY}&fields=sheets.properties`);
  if (!r.ok) throw new Error('Could not load sheet');
  const d = await r.json();
  return d.sheets.map(s => s.properties.title);
}

async function fetchSheet(name) {
  const enc = encodeURIComponent(name);
  const r   = await fetch(`${BASE}/values/${enc}?key=${API_KEY}&valueRenderOption=FORMATTED_VALUE`);
  if (!r.ok) throw new Error(`Could not load sheet: ${name}`);
  const d   = await r.json();
  return d.values || [];
}

// ─── SHEET CLASSIFIERS ─────────────────────────────────────────────────────
function isCareer(name)   { return /career/i.test(name); }
function isMonthly(name)  { return /leaderboard/i.test(name) && /\d{4}/.test(name) && !/event/i.test(name) && !isEventLB(name); }
function isEventLB(name)  { return /leaderboard/i.test(name) && /\d{2}-\d{2}/.test(name); }
function isPickSheet(name){ return !/leaderboard/i.test(name) && !/career/i.test(name) && !/data/i.test(name) && !/template/i.test(name) && /\d{2}-\d{2}/.test(name); }
function isEventsConfig(name) { return /^events$/i.test(name.trim()); }

function eventDateFromName(name) {
  const m = name.match(/(\d{2})-(\d{2})-(\d{2,4})/);
  if (!m) return 0;
  return parseInt(m[3]) * 10000 + parseInt(m[1]) * 100 + parseInt(m[2]);
}

// ─── CURRENT MONTH FILTER ──────────────────────────────────────────────────
function isCurrentMonth(name) {
  const now   = new Date();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const year  = String(now.getFullYear()).slice(-2);
  return name.includes(`${month}-`) && name.includes(`-${year}`);
}

// ─── PARSERS ───────────────────────────────────────────────────────────────
function parseLeaderboard(rows) {
  // Find the header row: first row where col 1 is '#' or col 2 is 'Player'
  let dataStart = 0;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    if (rows[i] && (rows[i][0] === '#' || rows[i][1] === 'Player')) {
      dataStart = i + 1;
      break;
    }
  }
  const entries = [];
  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[1] || row[1].trim() === '') continue;
    const pts = parseFloat(row[2]) || 0;
    entries.push({ rank: entries.length + 1, player: cleanName(row[1]), pts });
  }
  return entries;
}

function parseCareer(rows) {
  let dataStart = 0;
  for (let i = 0; i < Math.min(rows.length, 5); i++) {
    if (rows[i] && (rows[i][0] === '#' || rows[i][1] === 'Player')) {
      dataStart = i + 1;
      break;
    }
  }
  const entries = [];
  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[1] || row[1].trim() === '') continue;
    const pts  = parseFloat(row[4]) || 0;
    const belt = row[5] || '';
    entries.push({ rank: entries.length + 1, player: cleanName(row[1]), pts, belt });
  }
  return entries;
}

function parsePickSheet(rows) {
  if (!rows || rows.length < 3) return { fighters: [], players: [] };

  const headerRow = rows[0];
  const pointsRow = rows[1];

  // Fighter names from col 1 onwards, stop at TOTAL col
  const fighters = [];
  for (let c = 1; c < headerRow.length; c++) {
    const name = (headerRow[c] || '').replace(/\n/g, ' ').replace(/\s+/g, ' ').trim();
    if (!name || /total/i.test(name) || /rank/i.test(name)) break;
    // Extract just the fighter name (before the odds in parens)
    const cleanFighter = name.replace(/\s*[\(\[].*?[\)\]]\s*/g, '').trim();
    const pts = parseFloat((pointsRow[c] || '').replace(/[^0-9.]/g, '')) || 0;
    fighters.push({ name: cleanFighter, pts, col: c });
  }

  const players = [];
  for (let r = 2; r < rows.length; r++) {
    const row = rows[r];
    if (!row || !row[0] || row[0].trim() === '') continue;
    const playerName = cleanName(row[0]);
    const picks = [];
    let total = 0;

    for (const f of fighters) {
      const val = (row[f.col] || '').trim().toLowerCase();
      // Backups ('b') are intentionally excluded from the public display —
      // they're only a reserve pick, and should never show up here unless/until
      // you manually convert one to 'p' after a real no-contest/pull-out.
      if (val === 'p') {
        const earned = f.pts;
        total += earned;
        picks.push({ fighter: f.name, pts: f.pts, earned, pick: val });
      }
    }
    if (picks.length > 0) {
      players.push({ player: playerName, picks, total: parseFloat(total.toFixed(2)) });
    }
  }

  // Sort by total desc
  players.sort((a, b) => b.total - a.total);
  return { fighters, players };
}

function cleanName(n) {
  // Remove trailing bracket annotations like (2), (10), etc.
  return (n || '').replace(/\s*\(\d+\)\s*$/, '').trim();
}

// ─── SCORING TIER (BlueBar odds-based win bonus) ───────────────────────────
// -200 or longer  -> 0.5 win / 1 finish / 0.05 per 10 strikes,TD,KD
// -199 to -100    -> 1 win / 2 finish / 0.1 per 10 strikes,TD,KD
// +100 to +250    -> 2 win / 4 finish / 0.15 per 10 strikes,TD,KD
// +251 or longer  -> 4 win / 8 finish / 0.2 per 10 strikes,TD,KD
function oddsTier(odds) {
  const n = Number(odds);
  if (!isFinite(n) || n === 0) return { base: 0, finish: 0, bonus: 0 };
  if (n < 0) {
    return n <= -200 ? { base: 0.5, finish: 1, bonus: 0.05 } : { base: 1, finish: 2, bonus: 0.1 };
  }
  return n <= 250 ? { base: 2, finish: 4, bonus: 0.15 } : { base: 4, finish: 8, bonus: 0.2 };
}

function formatOdds(n) {
  const v = Number(n);
  return v > 0 ? `+${v}` : `${v}`;
}

// ─── EVENTS CONFIG PARSER ───────────────────────────────────────────────────
// Expects header row: Event Name | Status | Backup Mandatory | Event Date (MM-DD-YY) | Fighter | Odds | Matchup Order | Tier Override
function parseEvents(rows) {
  if (!rows || rows.length < 2) return [];
  const header = rows[0].map(h => (h || '').trim());
  const idx = {
    name: header.indexOf('Event Name'),
    status: header.indexOf('Status'),
    backup: header.indexOf('Backup Mandatory'),
    date: header.indexOf('Event Date (MM-DD-YY)'),
    fighter: header.indexOf('Fighter'),
    odds: header.indexOf('Odds'),
    order: header.indexOf('Matchup Order'),
    override: header.indexOf('Tier Override'), // optional column, -1 if absent
    maxPerEvent: header.indexOf('Max Picks Per Event'), // optional column, -1 if absent, defaults to 4
    freeAccess: header.indexOf('Free Access'), // optional column, -1 if absent, defaults to No
  };
  if ([idx.name, idx.status, idx.backup, idx.date, idx.fighter, idx.odds, idx.order].some(v => v === -1)) return [];

  const events = {};
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    if (!row || !row[idx.name]) continue;
    const name = row[idx.name].trim();
    if (!events[name]) {
      const maxRaw = idx.maxPerEvent >= 0 ? Number(row[idx.maxPerEvent]) : NaN;
      events[name] = {
        name,
        status: (row[idx.status] || '').trim().toLowerCase(),
        backupMandatory: (row[idx.backup] || '').trim().toLowerCase() === 'yes',
        eventDate: (row[idx.date] || '').trim(),
        maxPerEvent: (isFinite(maxRaw) && maxRaw > 0) ? maxRaw : 4,
        freeAccess: idx.freeAccess >= 0 && (row[idx.freeAccess] || '').trim().toLowerCase() === 'yes',
        fighters: [],
      };
    }
    const override = idx.override >= 0 ? (row[idx.override] || '').trim() : '';
    events[name].fighters.push({
      name: cleanName(row[idx.fighter]),
      odds: Number(row[idx.odds]) || 0,
      order: Number(row[idx.order]) || 0,
      tierOverride: override || null, // e.g. "5/10", takes precedence over odds-calculated tier
    });
  }
  Object.values(events).forEach(ev => ev.fighters.sort((a, b) => a.order - b.order));
  return Object.values(events);
}

// Count how many picks a discord username has already used this month,
// by scanning existing Pick Sheet tabs for that event's month.
function countMonthlyPicks(allTabData, discordUsername, monthMM) {
  let count = 0;
  const uname = (discordUsername || '').trim().toLowerCase();
  for (const [tabName, rows] of Object.entries(allTabData)) {
    const m = tabName.match(/\((\d{2})-(\d{2})-(\d{2})\)/);
    if (!m || m[1] !== monthMM) continue;
    if (!rows || rows.length < 3) continue;
    for (let r = 2; r < rows.length; r++) {
      const row = rows[r];
      if (!row || !row[0]) continue;
      if (row[0].trim().toLowerCase() !== uname) continue;
      count += row.slice(1).filter(v => (v || '').trim().toLowerCase() === 'p').length;
    }
  }
  return count;
}

// ─── RENDERERS ─────────────────────────────────────────────────────────────
function renderLoading() {
  return `<div class="status-box"><div class="spinner"></div>Loading standings…</div>`;
}

function renderError(msg) {
  return `<div class="status-box"><span class="icon">⚠️</span>${msg}</div>`;
}

function renderLeaderboard(entries, showBelt = false) {
  if (!entries.length) return `<div class="status-box"><span class="icon">🥋</span>No data yet</div>`;
  const rows = entries.map(e => {
    const rankClass = e.rank <= 3 ? `row-${e.rank}` : '';
    const numClass  = e.rank <= 3 ? `rank-${e.rank}` : '';
    const ptsClass  = e.pts > 0 ? 'pts-cell' : 'pts-cell pts-zero';
    const beltHtml  = showBelt && e.belt
      ? `<div class="player-belt">${e.belt}</div>` : '';
    return `<tr class="${rankClass}">
      <td class="rank-cell ${numClass}">${e.rank}</td>
      <td><div class="player-name">${e.player}</div>${beltHtml}</td>
      <td class="r ${ptsClass}">${e.pts}</td>
    </tr>`;
  }).join('');
  return `<table class="lb-table">
    <thead><tr>
      <th style="width:32px">#</th>
      <th>Player</th>
      <th class="r">Pts</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function renderPicks(data) {
  if (!data.players.length) return `<div class="status-box"><span class="icon">📋</span>No picks submitted yet</div>`;
  const cards = data.players.map(p => {
    const chips = p.picks.map(f => {
      const cls = f.pick === 'b' ? 'zero' : (f.pts > 0 ? 'scored' : 'zero');
      const ptsLabel = f.pick !== 'b' && f.pts > 0 ? `<span class="chip-pts">+${f.pts}</span>` : '';
      return `<span class="fighter-chip ${cls}">${f.fighter}${ptsLabel}</span>`;
    }).join('');
    return `<div class="pick-card">
      <div class="pick-card-header">
        <span class="pick-player">${p.player}</span>
        <span class="pick-total">${p.total} pts</span>
      </div>
      <div class="pick-fighters">${chips}</div>
    </div>`;
  }).join('');
  return `<div class="picks-list">${cards}</div>`;
}

// ─── SUBMIT PICKS FORM ──────────────────────────────────────────────────────
function renderSubmitForm(event) {
  const pairs = [];
  for (let i = 0; i < event.fighters.length; i += 2) {
    pairs.push([event.fighters[i], event.fighters[i + 1]]);
  }

  const matchupsHtml = pairs.map(([a, b]) => {
    const optA = fighterOptionHtml(a);
    const optB = b ? fighterOptionHtml(b) : '';
    return `<div class="matchup-block">
      ${optA}
      ${b ? '<div class="vs-divider">VS</div>' + optB : ''}
    </div>`;
  }).join('');

  const backupOptions = event.fighters.map(f =>
    `<option value="${f.name}">${f.name} (${formatOdds(f.odds)})</option>`
  ).join('');

  return `<div class="submit-wrap">
    ${event.freeAccess ? '<div class="free-access-banner">🎉 This event is FREE to enter — no BlueBar Pro subscription required! Non-members are scored on their own separate leaderboard.</div>' : ''}
    <div class="rules-box">
      <b>${event.name}</b> — you have 10 total picks for the month across all cards. The maximum number of fighters you can pick per event is ${event.maxPerEvent}. If you go over your total allotted budget, the fighters highest on the card you select (up until you reach 10) will be your selected fighters.
      <br><br>
      Only fight winners receive points — if your pick loses, they score 0.
      <br><br>
      <b>Scoring:</b><br>
      -200 or longer: 0.5pt win, 0.05pt per 10 total strikes/takedown landed/knockdown<br>
      -199 to -101: 1pt win, 0.1pt per 10 total strikes/takedown landed/knockdown<br>
      +100 to +250: 2pt win, 0.15pt per 10 total strikes/takedown landed/knockdown<br>
      +251 or longer: 4pt win, 0.2pt per 10 total strikes/takedown landed/knockdown<br>
      A finish doubles the win bonus, but NOT the strike/takedown/knockdown bonus.
      <br><br>
      ${event.backupMandatory ? '<b>Backup fighter is mandatory for this event.</b>' : 'Backup fighter is optional for this event.'}
    </div>

    <div class="field-group">
      <label class="field-label">Discord Username</label>
      <input class="field-input" id="pf-discord" type="text" placeholder="e.g. gage_bbh" autocomplete="off">
      <div class="budget-line" id="pf-budget"></div>
    </div>

    <div class="field-group">
      <label class="field-label">Email</label>
      <input class="field-input" id="pf-email" type="email" placeholder="you@example.com" autocomplete="off">
    </div>

    <div class="field-group">
      <label class="field-label">Your Picks (select 1-${event.maxPerEvent})</label>
      <div id="pf-matchups">${matchupsHtml}</div>
    </div>

    <div class="field-group">
      <label class="field-label">Backup Fighter ${event.backupMandatory ? '(required)' : '(optional)'}</label>
      <select class="backup-select" id="pf-backup">
        <option value="">— Select backup —</option>
        ${backupOptions}
      </select>
    </div>

    <button class="submit-btn" id="pf-submit">Submit Picks</button>
    <div id="pf-msg"></div>
  </div>`;
}

function fighterOptionHtml(f) {
  const tierText = f.tierOverride || (() => { const t = oddsTier(f.odds); return `${t.base}pt win / ${t.finish}pt finish / ${t.bonus}pt per 10 strikes,TD,KD`; })();
  return `<label class="fighter-option" data-fighter="${f.name}">
    <input type="checkbox" value="${f.name}" class="pf-fighter-checkbox">
    <div class="fighter-option-text">
      <div class="fighter-option-name">${f.name}</div>
      <div class="fighter-option-meta">${formatOdds(f.odds)} · ${f.tierOverride ? f.tierOverride + ' (special rule)' : tierText}</div>
    </div>
  </label>`;
}

function wireSubmitForm(event, monthTabData) {
  const monthMM = event.eventDate.split('-')[0];
  const checkboxes = Array.from(document.querySelectorAll('.pf-fighter-checkbox'));
  const budgetLine = document.getElementById('pf-budget');
  const discordInput = document.getElementById('pf-discord');
  const submitBtn = document.getElementById('pf-submit');
  const msgBox = document.getElementById('pf-msg');
  let monthlyUsed = 0;
  let monthlyChecked = false;

  function updateBudgetLine() {
    const selected = checkboxes.filter(c => c.checked).length;
    if (!monthlyChecked) {
      budgetLine.textContent = '';
      budgetLine.className = 'budget-line';
      return;
    }
    const remaining = Math.max(0, 10 - monthlyUsed);
    const overEvent = selected > event.maxPerEvent;
    const overMonth = selected > remaining;
    budgetLine.innerHTML = `Selected <b>${selected}/${event.maxPerEvent}</b> this event · <b>${remaining}</b> remaining of your 10 for the month`;
    budgetLine.className = 'budget-line' + (overEvent || overMonth ? ' warn' : '');
  }

  discordInput.addEventListener('blur', () => {
    const uname = discordInput.value.trim();
    if (!uname) return;
    monthlyUsed = countMonthlyPicks(monthTabData, uname, monthMM);
    monthlyChecked = true;
    updateBudgetLine();
  });

  checkboxes.forEach(cb => {
    cb.addEventListener('change', () => {
      const label = cb.closest('.fighter-option');
      label.classList.toggle('selected', cb.checked);
      const selectedCount = checkboxes.filter(c => c.checked).length;
      if (selectedCount > event.maxPerEvent) {
        cb.checked = false;
        label.classList.remove('selected');
      }
      updateBudgetLine();
    });
  });

  updateBudgetLine();

  submitBtn.addEventListener('click', async () => {
    msgBox.innerHTML = '';
    const discordUsername = discordInput.value.trim();
    const email = document.getElementById('pf-email').value.trim();
    const backup = document.getElementById('pf-backup').value;
    const picks = checkboxes.filter(c => c.checked).map(c => c.value);

    if (!discordUsername) return showMsg('Please enter your Discord username.', true);
    if (!email || !email.includes('@')) return showMsg('Please enter a valid email.', true);
    if (picks.length < 1) return showMsg('Select at least 1 fighter.', true);
    if (picks.length > event.maxPerEvent) return showMsg(`Max ${event.maxPerEvent} fighters for this event.`, true);
    if (event.backupMandatory && !backup) return showMsg('A backup fighter is required for this event.', true);
    if (monthlyChecked && picks.length > Math.max(0, 10 - monthlyUsed)) {
      return showMsg(`You only have ${Math.max(0, 10 - monthlyUsed)} pick(s) left in your monthly budget.`, true);
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ eventName: event.name, discordUsername, email, picks, backup: backup || null }),
      });
      const data = await res.json();
      if (data.success) {
        const bracketNote = data.bracket === 'free'
          ? " You've been placed in the Free bracket, scored separately from BlueBar Pro members."
          : data.bracket === 'paid'
            ? " You've been placed in the BlueBar Pro bracket."
            : '';
        showMsg(`Picks submitted!${bracketNote} You can resubmit any time before the event locks to change them.`, false);
      } else {
        showMsg(data.error || 'Something went wrong submitting your picks.', true);
      }
    } catch (e) {
      showMsg('Could not reach the submission service. Try again shortly.', true);
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Picks';
  });

  function showMsg(text, isError) {
    msgBox.innerHTML = `<div class="form-msg ${isError ? 'error' : 'success'}">${text}</div>`;
  }
}

// ─── TAB SYSTEM ────────────────────────────────────────────────────────────
function buildTabs(tabDefs) {
  const container = document.getElementById('tabs-container');
  const vContainer = document.getElementById('views-container');
  container.innerHTML = '';
  vContainer.innerHTML = '';

  tabDefs.forEach((t, i) => {
    // Tab button
    const btn = document.createElement('div');
    btn.className = 'tab' + (i === 0 ? ' active' : '');
    btn.textContent = t.label;
    btn.onclick = () => switchTab(i);
    container.appendChild(btn);

    // View div
    const view = document.createElement('div');
    view.className = 'view' + (i === 0 ? ' active' : '');
    view.id = `view-${i}`;
    view.innerHTML = renderLoading();
    vContainer.appendChild(view);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.view').forEach((v, i) => v.classList.toggle('active', i === idx));
  activeTab = idx;
}

// ─── MAIN LOADER ───────────────────────────────────────────────────────────
async function init() {
  const vContainer = document.getElementById('views-container');
  vContainer.innerHTML = renderLoading();

  try {
    const allSheets = await fetchSheetNames();

    // Classify sheets
    const careerSheet   = allSheets.find(isCareer);
    const monthlySheets = allSheets.filter(s => /leaderboard/i.test(s) && /20\d\d/i.test(s) && !isEventLB(s));
    const eventsSheet   = allSheets.find(isEventsConfig);

    // Get current month event leaderboards and pick sheets
    const currentMonthEventLBs = allSheets
      .filter(isEventLB)
      .filter(isCurrentMonth)
      .sort((a, b) => eventDateFromName(b) - eventDateFromName(a));

    const currentMonthPickSheets = allSheets
      .filter(isPickSheet)
      .filter(isCurrentMonth)
      .sort((a, b) => eventDateFromName(b) - eventDateFromName(a));

    // Fetch Events config + open event (for Submit Picks tab)
    let openEvent = null;
    let allEvents = [];
    let monthTabData = {};
    if (eventsSheet) {
      try {
        const eventRows = await fetchSheet(eventsSheet);
        allEvents = parseEvents(eventRows);
        openEvent = allEvents.find(e => e.status === 'open') || null;
        if (openEvent) {
          // Pull all current-month pick sheets so we can compute each member's remaining monthly budget
          for (const s of currentMonthPickSheets) {
            try { monthTabData[s] = await fetchSheet(s); } catch (e) { /* ignore */ }
          }
        }
      } catch (e) { /* Events tab optional; ignore if missing/misconfigured */ }
    }

    // Matches a Pick Sheet tab name back to its Events config row to check status.
    // Tabs with no matching config (e.g. older events predating this system) are
    // treated as visible, since there's nothing to hide them behind.
    function statusForPickSheetTab(tabName) {
      const rawName = tabName.replace(/\(.*?\)/g, '').replace(/picks/i, '').trim().toLowerCase();
      const match = allEvents.find(e => e.name.trim().toLowerCase() === rawName);
      return match ? match.status : null;
    }

    // Build tab definitions
    const tabDefs = [];

    if (openEvent) tabDefs.push({ label: 'Submit Picks', type: 'submit', event: openEvent });
    if (careerSheet) tabDefs.push({ label: 'Career', type: 'career', sheet: careerSheet });

    // Monthly leaderboards sorted newest first
    monthlySheets
      .sort((a, b) => {
        const getMonth = s => { const m = s.match(/([A-Za-z]+)\s+(\d{4})/); return m ? new Date(`${m[1]} 1, ${m[2]}`).getTime() : 0; };
        return getMonth(b) - getMonth(a);
      })
      .forEach(s => {
        const label = s.replace(/leaderboard/i, '').trim().replace(/\s+/g, ' ');
        tabDefs.push({ label, type: 'leaderboard', sheet: s });
      });

    // Current month event leaderboards
    currentMonthEventLBs.forEach(s => {
      const label = s.replace(/leaderboard/i, '').replace(/\(.*?\)/g, '').trim();
      tabDefs.push({ label, type: 'leaderboard', sheet: s });
    });

    // Current month pick sheets — hidden from public view while the event is still Open,
    // so members can't metagame off each other's picks before the card closes.
    currentMonthPickSheets.forEach(s => {
      const label = s.replace(/picks/i, '').replace(/\(.*?\)/g, '').trim() + ' Picks';
      const hidden = statusForPickSheetTab(s) === 'open';
      tabDefs.push({ label, type: 'picks', sheet: s, hidden });
    });

    if (!tabDefs.length) {
      vContainer.innerHTML = renderError('No sheets found. Check sharing settings.');
      return;
    }

    buildTabs(tabDefs);

    // Load all sheets
    for (let i = 0; i < tabDefs.length; i++) {
      const t    = tabDefs[i];
      const view = document.getElementById(`view-${i}`);

      if (t.type === 'submit') {
        view.innerHTML = renderSubmitForm(t.event);
        wireSubmitForm(t.event, monthTabData);
        continue;
      }

      if (t.type === 'picks' && t.hidden) {
        view.innerHTML = `<div class="status-box"><span class="icon">🔒</span>Picks for this event are hidden until it closes, so nobody can see everyone else's picks before making their own.</div>`;
        continue;
      }

      try {
        const rows = await fetchSheet(t.sheet);
        let html = '';
        if (t.type === 'career') {
          const entries = parseCareer(rows);
          html = `<div class="section-label">All-time career standings</div>` + renderLeaderboard(entries, true);
        } else if (t.type === 'leaderboard') {
          const entries = parseLeaderboard(rows);
          html = `<div class="section-label">${t.sheet}</div>` + renderLeaderboard(entries, false);
        } else if (t.type === 'picks') {
          const data = parsePickSheet(rows);
          html = `<div class="section-label">${t.sheet}</div>` + renderPicks(data);
        }
        view.innerHTML = html;
      } catch (e) {
        view.innerHTML = renderError(`Couldn't load ${t.sheet}`);
      }
    }

  } catch (e) {
    vContainer.innerHTML = renderError('Could not connect to Google Sheets. Check that the sheet is set to public.');
  }
}

init();
</script>
